# 2Care.ai Voice AI Agent - Docker Compose

services:
  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: care2ai-frontend
    ports:
      - "3000:80"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - care2ai-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Main Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: care2ai-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://care2ai:care2ai_secret@postgres:5432/care2ai_db
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AZURE_SPEECH_KEY=${AZURE_SPEECH_KEY}
      - AZURE_SPEECH_REGION=${AZURE_SPEECH_REGION:-eastus}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - care2ai-network

  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: care2ai-postgres
    environment:
      - POSTGRES_USER=care2ai
      - POSTGRES_PASSWORD=care2ai_secret
      - POSTGRES_DB=care2ai_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U care2ai -d care2ai_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - care2ai-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: care2ai-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - care2ai-network

  # PgAdmin (Optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: care2ai-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@care2ai.com
      - PGADMIN_DEFAULT_PASSWORD=admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - care2ai-network
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:

networks:
  care2ai-network:
    driver: bridge
